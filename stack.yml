# ──────────────────────────────────────────────────────────────────────────────
# opa-api-whatsapp — STACK para Docker SWARM (Portainer).
# Swarm não builda imagens: usa as do GitHub Container Registry (ghcr).
# Build/push das imagens:
#   docker buildx build --platform linux/amd64 --target runner -t ghcr.io/cairowesley/opa-api-whatsapp-app:latest --push .
#   docker buildx build --platform linux/amd64 --target worker -t ghcr.io/cairowesley/opa-api-whatsapp-worker:latest --push .
#
# Secrets default = dev. Em produção, troque via Environment variables do stack
# no Portainer (POSTGRES_PASSWORD, APP_ENCRYPTION_KEY, SESSION_SECRET, etc).
# ──────────────────────────────────────────────────────────────────────────────
version: "3.8"

services:
  db:
    image: supabase/postgres:15.1.1.78
    environment:
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-48debb7e1760c641ce6a250a6173c8cf}
      JWT_SECRET: ${JWT_SECRET:-4715d65c3eadc7c1b3c5e1de8aa32b8c6286a95c}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/postgres/00-roles.sql:/docker-entrypoint-initdb.d/00-roles.sql:ro
      - ./supabase/migrations/0001_init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./supabase/migrations/0002_dashboard_users.sql:/docker-entrypoint-initdb.d/01b-users.sql:ro
      - ./supabase/migrations/0004_resource_tables.sql:/docker-entrypoint-initdb.d/01c-resources.sql:ro
      - ./supabase/migrations/0005_api_tokens.sql:/docker-entrypoint-initdb.d/01d-tokens.sql:ro
      - ./supabase/migrations/0006_client_config_token_scope.sql:/docker-entrypoint-initdb.d/01e-config.sql:ro
      - ./supabase/migrations/0007_resource_access.sql:/docker-entrypoint-initdb.d/01f-access.sql:ro
      - ./supabase/migrations/0008_sync_runs.sql:/docker-entrypoint-initdb.d/01g-runs.sql:ro
      - ./supabase/migrations/0009_settings.sql:/docker-entrypoint-initdb.d/01h-settings.sql:ro
      - ./supabase/migrations/0010_user_roles.sql:/docker-entrypoint-initdb.d/01i-roles.sql:ro
      - ./supabase/migrations/0011_disabled_resources.sql:/docker-entrypoint-initdb.d/01j-disabled.sql:ro
      - ./supabase/migrations/0012_archive_clients.sql:/docker-entrypoint-initdb.d/01k-archive.sql:ro
      - ./supabase/migrations/0013_cancel_sync.sql:/docker-entrypoint-initdb.d/01l-cancel.sql:ro
      - ./docker/postgres/02-grants.sql:/docker-entrypoint-initdb.d/02-grants.sql:ro
    deploy:
      restart_policy: { condition: any }

  rest:
    image: postgrest/postgrest:v12.2.0
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD:-48debb7e1760c641ce6a250a6173c8cf}@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-4715d65c3eadc7c1b3c5e1de8aa32b8c6286a95c}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    deploy:
      restart_policy: { condition: any }

  kong:
    image: kong:2.8.1
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      KONG_NGINX_HTTP_CLIENT_BODY_BUFFER_SIZE: 16m
    volumes:
      - ./docker/kong/kong.yml:/home/kong/kong.yml:ro
    deploy:
      restart_policy: { condition: any }

  redis:
    image: redis:7-alpine
    command: sh -c 'redis-server --requirepass "$$REDIS_PASSWORD" --save "" --appendonly no'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-localredispass}
    deploy:
      restart_policy: { condition: any }

  app:
    image: ghcr.io/cairowesley/opa-api-whatsapp-app:latest
    ports:
      - "3000:3000"
    environment:
      SUPABASE_URL: http://kong:8000
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:48debb7e1760c641ce6a250a6173c8cf@db:5432/postgres}
      SUPABASE_SERVICE_KEY: ${SERVICE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ewogICJyb2xlIjogInNlcnZpY2Vfcm9sZSIsCiAgImlzcyI6ICJzdXBhYmFzZSIsCiAgImlhdCI6IDE3MTUwNTA4MDAsCiAgImV4cCI6IDE4NzI4MTcyMDAKfQ.8DIYyikDPJNlYr_oECt63d68flhBfVtR2PN2xW8bA6M}
      APP_ADMIN_TOKEN: ${APP_ADMIN_TOKEN:-local-admin-token}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-wLwI/XiFB5LF0Gp+nYFLZqwCr5/l/+oEsyWq2t+Nx/E=}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-60}
      OPA_PAGE_SIZE: ${OPA_PAGE_SIZE:-1000}
      OPA_TIMEOUT_MS: ${OPA_TIMEOUT_MS:-30000}
      DEFAULT_LOOKBACK_DAYS: ${DEFAULT_LOOKBACK_DAYS:-30}
      CRON_SECRET: ${CRON_SECRET:-local-admin-token}
      REDIS_URL: ${REDIS_URL:-redis://:localredispass@redis:6379}
      SESSION_SECRET: ${SESSION_SECRET:-troque-este-secret-de-sessao}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-12}
      DASHBOARD_DEFAULT_USER: ${DASHBOARD_DEFAULT_USER:-admin}
      DASHBOARD_DEFAULT_PASSWORD: ${DASHBOARD_DEFAULT_PASSWORD:-admin123}
    deploy:
      restart_policy: { condition: any }

  worker:
    image: ghcr.io/cairowesley/opa-api-whatsapp-worker:latest
    environment:
      SUPABASE_URL: http://kong:8000
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:48debb7e1760c641ce6a250a6173c8cf@db:5432/postgres}
      SUPABASE_SERVICE_KEY: ${SERVICE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ewogICJyb2xlIjogInNlcnZpY2Vfcm9sZSIsCiAgImlzcyI6ICJzdXBhYmFzZSIsCiAgImlhdCI6IDE3MTUwNTA4MDAsCiAgImV4cCI6IDE4NzI4MTcyMDAKfQ.8DIYyikDPJNlYr_oECt63d68flhBfVtR2PN2xW8bA6M}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-wLwI/XiFB5LF0Gp+nYFLZqwCr5/l/+oEsyWq2t+Nx/E=}
      OPA_PAGE_SIZE: ${OPA_PAGE_SIZE:-1000}
      OPA_TIMEOUT_MS: ${OPA_TIMEOUT_MS:-30000}
      DEFAULT_LOOKBACK_DAYS: ${DEFAULT_LOOKBACK_DAYS:-30}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-60}
      REDIS_URL: ${REDIS_URL:-redis://:localredispass@redis:6379}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-8}
      WORKER_RESOURCE_CONCURRENCY: ${WORKER_RESOURCE_CONCURRENCY:-3}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      SCHEDULER_INTERVAL_SEC: ${SCHEDULER_INTERVAL_SEC:-60}
      REVALIDATE_HOURS: ${REVALIDATE_HOURS:-12}
    deploy:
      restart_policy: { condition: any }

volumes:
  db_data:
